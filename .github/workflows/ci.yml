name: CI

on:
  push:
    branches:
      - main
      - "deployment/documentation"
      - "deployment"
      - "BugFix"
      - "features"
      - "feature-**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - "deployment/documentation"
      - "BugFix"
      - "features"
      - "feature-**"
      - "feature/**"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"
      - run: npm ci
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
  
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
      - name: Lint and type check
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
      - name: Compile
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
      - name: Run tests with coverage
        if: github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          test-script: npx jest address.service.test app.test logger.service.test --config jest.config.js --passWithNoTests

      - name: Run tests
        if: github.event_name != 'pull_request'
        run: npx jest address.service.test app.test logger.service.test --config jest.config.js --passWithNoTests
  
  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: [build]
    if: |
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/deployment/documentation' ||
        github.ref == 'refs/heads/deployment'
      )
    steps:
      - name: Pull latest code
        run: |
          cd ~/addresses
          git pull origin ${{ github.ref_name }}
 
      - name: Install dependencies
        run: |
          cd ~/addresses
          npm ci --omit=dev
 
      - name: Build
        run: |
          cd ~/addresses
          npm run build
 
      - name: Restart app
        run: |
          pkill -SIGTERM -f "node.*server.js" || true
          sleep 16
          nohup node ~/addresses/dist/src/server.js >> ~/addresses/app.log 2>&1 &
          echo "Started PID: $!"
  health-check:
    name: Health Check
    runs-on: self-hosted
    needs: [deploy]
    steps:
      - name: Wait for app to come up
        run: |
          echo "Waiting for health check..."
          for i in $(seq 1 12); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 5 "http://localhost:${{ secrets.SERVER_PORT }}/health" || echo "000")
 
            echo "Attempt $i — HTTP $STATUS"
 
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
 
            sleep 5
          done
 
          echo "Health check failed after 60 seconds."
          exit 1
 