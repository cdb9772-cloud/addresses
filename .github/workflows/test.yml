name: Run Tests

on:
  push:
    branches:
      - main
      - "BugFix"
      - "features"
  pull_request:
    branches:
      - main
      - "BugFix"
      - "features"

jobs:
  test:
    name: Address Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run address service tests
        run: npx jest address.service.test --config jest.config.ts --passWithNoTests